<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Elliot Log">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FB923C">
<title>Elliot Log</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <div class="header-row">
    <h1>Elliot Log</h1>
    <button class="setup-btn" data-action="show-setup"><span class="sync-dot" id="syncDot"></span>Setup</button>
  </div>
  <div class="header-time" id="headerTime"></div>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-val feed" id="statFeeds">-</div><div class="stat-label">feeds today</div></div>
  <div class="stat"><div class="stat-val diaper" id="statDiapers">-</div><div class="stat-label">diapers</div></div>
  <div class="stat"><div class="stat-val pump" id="statPumps">-</div><div class="stat-label">pumps</div></div>
  <div class="stat"><div class="stat-val time-since" id="statLastFeed">-</div><div class="stat-label">since last feed</div></div>
</div>

<div class="tabs">
  <button class="tab active" data-view="today" data-action="switch-tab">Today</button>
  <button class="tab" data-view="history" data-action="switch-tab">History</button>
</div>

<div class="content">
  <div class="view active" id="todayView">
    <div id="autoAddBanner"></div>
    <div class="filter-bar">
      <button class="filter-pill active" data-action="set-filter" data-filter="all">All</button>
      <button class="filter-pill" data-action="set-filter" data-filter="Feed">Feeds</button>
      <button class="filter-pill" data-action="set-filter" data-filter="Diaper">Diapers</button>
      <button class="filter-pill" data-action="set-filter" data-filter="Pump">Pumps</button>
    </div>
    <div id="todayEntries"></div>
  </div>
  <div class="view" id="historyView">
    <div id="historyEntries"></div>
  </div>
</div>

<div class="bottom-wrap">
  <div id="toast" style="display:none;background:var(--gray-900);color:white;padding:10px 24px;font-size:14px;font-weight:600;text-align:center;width:100%"></div>
  <div class="bottom-bar">
    <button class="bot-btn pee" data-action="quick-diaper" data-diaper="Pee diaper"><span class="bot-icon">💧</span>Pee</button>
    <button class="bot-btn poo" data-action="quick-diaper" data-diaper="Poo diaper"><span class="bot-icon">💩</span>Poo</button>
    <button class="bot-btn poopee" data-action="quick-diaper" data-diaper="Pee & poo diaper"><span class="bot-icon">💩💧</span>Poo+Pee</button>
    <button class="bot-btn feed" data-action="show-feed-form"><span class="bot-icon">🍼</span>Feed</button>
    <button class="bot-btn pump" data-action="show-pump-form"><span class="bot-icon">🥛</span>Pump</button>
    <button class="bot-btn voice" id="voiceBtn" data-action="start-voice"><span class="bot-icon">🎙️</span>Voice</button>
    <button class="bot-btn more" data-action="show-more-menu"><span class="bot-icon">＋</span>More</button>
  </div>
</div>

<!-- Voice Overlay -->
<div class="voice-overlay" id="voiceOverlay">
  <div class="voice-box">
    <div class="voice-mic" id="voiceMic">🎙️</div>
    <div class="voice-status" id="voiceStatus">Listening...</div>
    <div class="voice-transcript" id="voiceTranscript"></div>
    <div class="voice-parsed" id="voiceParsed">
      <div class="vp-type" id="vpType"></div>
      <div class="vp-details" id="vpDetails"></div>
    </div>
    <div class="voice-btns" id="voiceBtns">
      <button class="voice-btn cancel" data-action="cancel-voice">Cancel</button>
    </div>
  </div>
</div>

<!-- Feed Modal -->
<div class="modal-overlay" id="feedModal">
  <div class="modal">
    <h2>Log Feed</h2>
    <div class="form-row"><label>Time</label><input type="time" id="fTime"></div>
    <div class="form-row">
      <label>Side</label>
      <div class="pill-group">
        <button class="pill" data-action="pick-pill" data-group="fSide">L</button>
        <button class="pill" data-action="pick-pill" data-group="fSide">R</button>
        <button class="pill" data-action="pick-pill" data-group="fSide">L→R</button>
        <button class="pill" data-action="pick-pill" data-group="fSide">R→L</button>
        <button class="pill" data-action="pick-pill" data-group="fSide">LRL</button>
        <button class="pill" data-action="pick-pill" data-group="fSide">RLR</button>
      </div>
    </div>
    <div class="form-row">
      <label>Nipple Shield</label>
      <div class="pill-group">
        <button class="pill shield" data-action="pick-pill" data-group="fShield">None</button>
        <button class="pill shield" data-action="pick-pill" data-group="fShield">L</button>
        <button class="pill shield" data-action="pick-pill" data-group="fShield">R</button>
        <button class="pill shield" data-action="pick-pill" data-group="fShield">Both</button>
        <button class="pill shield" data-action="pick-pill" data-group="fShield">Mixed</button>
      </div>
    </div>
    <div class="form-row"><label>Amount (optional)</label><input type="text" id="fAmount" placeholder="e.g. 30ml formula"></div>
    <div class="form-row"><label>Notes</label><textarea id="fNotes" placeholder="e.g. lots of milk, very sleepy..."></textarea></div>
    <button class="submit-btn feed" id="feedSubmitBtn" data-action="submit-feed">Log Feed</button>
    <div class="cancel-link" data-action="close-modal" data-modal="feedModal">Cancel</div>
  </div>
</div>

<!-- Pump Modal -->
<div class="modal-overlay" id="pumpModal">
  <div class="modal">
    <h2>Log Pump</h2>
    <div class="form-row"><label>Time</label><input type="time" id="pTime"></div>
    <div class="form-row"><label>Amount</label><input type="text" id="pAmount" placeholder="e.g. 30ml"></div>
    <div class="form-row"><label>Notes</label><textarea id="pNotes" placeholder="e.g. mostly left, 12 min..."></textarea></div>
    <button class="submit-btn pump" id="pumpSubmitBtn" data-action="submit-pump">Log Pump</button>
    <div class="cancel-link" data-action="close-modal" data-modal="pumpModal">Cancel</div>
  </div>
</div>

<!-- More Modal -->
<div class="modal-overlay" id="moreModal">
  <div class="modal">
    <h2>More Options</h2>
    <div class="quick-diaper-options">
      <button class="qd-btn pee" data-action="quick-diaper-close" data-diaper="Pee diaper">💧 Pee</button>
      <button class="qd-btn poo" data-action="quick-diaper-close" data-diaper="Poo diaper">💩 Poo</button>
      <button class="qd-btn both" data-action="quick-diaper-close" data-diaper="Pee & poo diaper">💧💩 Both</button>
      <button class="qd-btn live" data-action="quick-diaper-close" data-diaper="Pee & poo diaper (live)">⚡ Live</button>
    </div>
    <button class="submit-btn note" data-action="show-note-form">Add Note</button>
    <div style="margin-top:14px"><button class="submit-btn" style="background:var(--gray-200);color:var(--gray-700)" data-action="refresh-data">Refresh from Sheet</button></div>
    <div class="cancel-link" data-action="close-modal" data-modal="moreModal">Cancel</div>
  </div>
</div>

<!-- Note Modal -->
<div class="modal-overlay" id="noteModal">
  <div class="modal">
    <h2>Add Note</h2>
    <div class="form-row"><label>Time</label><input type="time" id="nTime"></div>
    <div class="form-row"><label>Note</label><textarea id="nText" placeholder="Anything you want to remember..." style="height:90px"></textarea></div>
    <button class="submit-btn note" id="noteSubmitBtn" data-action="submit-note">Log Note</button>
    <div class="cancel-link" data-action="close-modal" data-modal="noteModal">Cancel</div>
  </div>
</div>

<!-- Diaper Edit Modal (Fix #5) -->
<div class="modal-overlay" id="diaperModal">
  <div class="modal">
    <h2>Edit Diaper</h2>
    <div class="form-row"><label>Time</label><input type="time" id="dTime"></div>
    <div class="form-row">
      <label>Type</label>
      <div class="pill-group" id="dTypePills">
        <button class="pill diaper-type" data-action="pick-diaper-pill" data-value="Pee diaper">💧 Pee</button>
        <button class="pill diaper-type" data-action="pick-diaper-pill" data-value="Poo diaper">💩 Poo</button>
        <button class="pill diaper-type" data-action="pick-diaper-pill" data-value="Pee & poo diaper">💧💩 Both</button>
      </div>
    </div>
    <div class="form-row"><label>Notes</label><textarea id="dNotes" placeholder="e.g. green, runny..."></textarea></div>
    <button class="submit-btn diaper" id="diaperSubmitBtn" data-action="submit-diaper">Update Diaper</button>
    <div class="cancel-link" data-action="close-modal" data-modal="diaperModal">Cancel</div>
  </div>
</div>

<!-- Setup Modal -->
<div class="modal-overlay" id="setupModal">
  <div class="modal setup-modal">
    <h2>Setup</h2>
    <p style="font-size:13px;color:var(--gray-500);margin-bottom:8px">Paste your Google Apps Script Web App URL:</p>
    <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
    <button class="save-btn" data-action="save-setup">Save & Test Connection</button>
    <div id="setupStatus"></div>
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--gray-200)">
      <p style="font-size:12px;color:var(--gray-400)">Dictation URL for Claude skill:</p>
      <p style="font-size:11px;color:var(--gray-500);font-family:monospace;word-break:break-all;margin-top:4px" id="appBaseUrl"></p>
    </div>
    <div class="cancel-link" data-action="close-modal" data-modal="setupModal">Close</div>
  </div>
</div>

<!-- Delete Confirm Overlay -->
<div id="deleteConfirm" style="display:none"></div>

<script src="app.js"></script>
</body>
</html>
